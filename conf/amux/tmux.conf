# amux tmux config — managed by amux, do not edit
# This config locks down everything that could cause title drift,
# while exposing amux panels as window tabs in one global session.

# Basics
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g  history-limit 50000
set -g  mouse off
set -g  focus-events off
set -g  escape-time 0
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on

# Status bar — context-sensitive hints
#   In copy-mode (watching): show Enter to drop into edit, ^q to detach
#   In normal mode (editing): show Esc to return to watch, ^q to detach
set -g status on
set -g status-position top
set -g status-justify left
set -g status-left-length 0
set -g status-right-length 50
set -g status-left ""
set -g status-right "#{?pane_in_mode,#[fg=colour244] watching · Enter: edit  M-q: detach  M-t: end,#[fg=colour244] editing · Esc: watch  M-q: detach  M-t: end}"
set -g status-style "bg=default,fg=colour252"
set -g window-status-separator " "
set -g window-status-format ' #[fg=colour244]M-#{window_index}:#{window_name} '
set -g window-status-current-format ' #[bold,fg=green]M-#{window_index}:#{window_name} '

# Refresh status bar frequently so mode changes show immediately
set -g status-interval 1

# Lock down titles — prevent shell escape sequences from renaming panels
set  -g set-titles off
setw -g allow-set-title off
setw -g allow-rename off
setw -g automatic-rename off

# Pane borders still show the panel name inside each tab
set -g pane-border-status top
set -g pane-border-format ' #[bold]#{window_name} '
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=green,bold"
set -g pane-border-lines heavy

# No prefix key; direct keybindings
set -g prefix None
unbind-key -a

# Auto-enter copy-mode (watch) on attach and window switch
set-hook -g client-attached "copy-mode"
set-hook -g session-window-changed "copy-mode"

bind-key -n Escape copy-mode
bind-key -n M-q detach-client
bind-key -n M-t confirm-before -p "terminate all panels? (y/n)" kill-session
# Meta+number panel switching
bind-key -n M-1 select-window -t :=1
bind-key -n M-2 select-window -t :=2
bind-key -n M-3 select-window -t :=3
bind-key -n M-4 select-window -t :=4
bind-key -n M-5 select-window -t :=5
bind-key -n M-6 select-window -t :=6
bind-key -n M-7 select-window -t :=7
bind-key -n M-8 select-window -t :=8
bind-key -n M-9 select-window -t :=9
